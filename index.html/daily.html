    <style>
/* 可爱俏皮联系弹窗 */
.contact-modal {
  display: none;
  position: fixed;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  z-index: 9999;
  justify-content: center;
  align-items: center;
}

.contact-box {
  background: #fff;
  padding: 32px 24px;
  border-radius: 24px;
  width: 90%;
  max-width: 380px;
  text-align: center;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
  border: 2px solid #f8e8f0;
  position: relative;
}

.contact-box::before {
  content: "🌟";
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 22px;
}

.contact-box h3 {
  margin-bottom: 20px;
  color: #ff7597;
  font-size: 20px;
}

.contact-box p {
  margin: 12px 0;
  font-size: 15px;
  color: #555;
  background: #fef4f8;
  padding: 10px;
  border-radius: 12px;
}

.close-btn {
  margin-top: 20px;
  padding: 10px 24px;
  background: #ff9bbb;
  color: #fff;
  font-weight: bold;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.2s;
}

.close-btn:hover {
  background: #ff7597;
}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 全局背景：海边日落图（和首页保持一致） */
        body {

        /* 导航栏（和首页一致） */

            z-index: 999;

        .logo {
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 14px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .nav-links a:hover {
            color: #e3efff;
        }

        /* 日常页面标题 */
        .daily-title {
            margin-top: 80px;
            text-align: center;
            font-size: 24px;
            color: #444f5a;
        }

        /* 朋友圈样式容器 */
        .moments-container {
            max-width: 700px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* 单条朋友圈样式 */
        .moment-item {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(100, 120, 150, 0.1);
        }

        /* 头像和昵称 */
        .moment-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 12px;
            object-fit: cover;
        }

        .nickname {
            font-weight: bold;
            color: #333;
            font-size: 16px;
        }

        /* 文字内容 */
        .moment-content {
            color: #555;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        /* 图片网格（最多9张，仿朋友圈） */
        .moment-images {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }

        .moment-images img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 6px;
        }

        /* 时间 */
        .moment-time {
            color: #999;
            font-size: 12px;
        }

        footer {
            background: rgba(91, 112, 131, 0.9);
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 30px;
            font-size: 14px;
        }

        /* 手机适配 */
        @media (max-width: 600px) {
            .moment-images img {
                height: 80px;
            }
        }
    </style>

    <script>
// 显示联系方式弹窗
function showContact() {
  document.getElementById('contactModal').style.display = 'flex';
}
function closeContact() {
  document.getElementById('contactModal').style.display = 'none';
}

// 日常图片点击放大
document.addEventListener('DOMContentLoaded', function () {
  const imgs = document.querySelectorAll('.moment-images img');
  imgs.forEach(img => {
    img.addEventListener('click', function () {
      const modal = document.createElement('div');
      modal.style.cssText = `
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85);
        z-index: 99999;
        display: flex; align-items: center; justify-content: center;
      `;
      const bigImg = document.createElement('img');
      bigImg.src = this.src;
      bigImg.alt = this.alt;
      bigImg.style.cssText = `
        max-width: 92%; max-height: 90%; border-radius: 10px;
      `;
      modal.appendChild(bigImg);
      modal.addEventListener('click', () => modal.remove());
      document.body.appendChild(modal);
    });
  });
});
</script>
