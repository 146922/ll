    <style>
        
        /* 弹幕区域：只在中间飘 */
.barrage-area {
  position: fixed;
  top: 30%;
  left: 0;
  width: 100%;
  height: 40%;
  pointer-events: none;
  overflow: hidden;
  z-index: 999;
}

/* 单条留言样式 */
.barrage-item {
  position: absolute;
  white-space: nowrap;
  font-size: 17px;
  color: #ffffff;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  animation: barrageGo linear forwards;
}

@keyframes barrageGo {
  from { transform: translateX(100vw); }
  to { transform: translateX(-100%); }
}

/* 发送框 */
.send-bar {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 400px;
  display: flex;
  gap: 8px;
  background: rgba(255,255,255,0.9);
  padding: 8px 12px;
  border-radius: 30px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  z-index: 1000;
}
.send-bar input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-size: 14px;
}
.send-bar button {
  border: none;
  background: #ff5c8d;
  color: #fff;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 14px;
}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 全局背景：海边日落图 */
        body {
            background: url("sunset-bg.jpg") center center / cover no-repeat fixed;
            min-height: 100vh;
            margin: 0;
        }


        /* 导航栏 */
        nav {
            background: rgba(91, 112, 131, 0.9);
            padding: 0 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 999;
        }

        .logo {
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 14px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .nav-links a:hover {
            color: #e3efff;
        }

        /* 顶部大图 */
        .banner {
            margin-top: 60px;
            width: 100%;
            height: 280px;
            background: url("top.jpg") center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.4);
        }

        /* 内容 */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 22px;
            color: orange;
        }

        /* 卡片 */
.img-box {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
}
.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(100, 120, 150, 0.1);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card p {
            padding: 12px;
            text-align: center;
            color: #555;
        }

        footer {
            background: rgba(91, 112, 131, 0.9);
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 30px;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .banner {
                height: 220px;
                font-size: 20px;
            }
        }
/* 可爱俏皮联系弹窗 */
.contact-modal {
  display: none;
  position: fixed;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  z-index: 9999;
  justify-content: center;
  align-items: center;
}

.contact-box {
  background: #fff;
  padding: 32px 24px;
  border-radius: 24px;
  width: 90%;
  max-width: 380px;
  text-align: center;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
  border: 2px solid #f8e8f0;
  position: relative;
}

.contact-box::before {
  content: "🌟";
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 22px;
}

.contact-box h3 {
  margin-bottom: 20px;
  color: #ff7597;
  font-size: 20px;
}

.contact-box p {
  margin: 12px 0;
  font-size: 15px;
  color: #555;
  background: #fef4f8;
  padding: 10px;
  border-radius: 12px;
}

.close-btn {
  margin-top: 20px;
  padding: 10px 24px;
  background: #ff9bbb;
  color: #fff;
  font-weight: bold;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.2s;
}

.close-btn:hover {

}

/* 弹窗遮罩 */
.popup-mask {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;

/* 弹窗内容 */

.popup-title {

.popup-desc {

.popup-close {
  padding: 10px 25px;
  background: #5c9ce6;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
}
.popup-close:hover {
  background: #4a8fd6;
}

<!-- 弹窗结构 -->
<div class="popup-mask" id="popup">
  <div class="popup-box">

<script>
// 关闭弹窗
function closePopup() {
  document.getElementById("popup").style.display = "none";
}
// 页面加载自动显示
window.onload = function() {
  document.getElementById("popup").style.display = "flex";
}
</script>
<!-- 中间弹幕区域 -->
<div class="barrage-area" id="barrageBox"></div>

<!-- 发送框 -->
<div class="send-bar">
  <input type="text" id="msgText" placeholder="写下你的留言～">
  <button onclick="sendMsg()">发送</button>
</div>

<script>
function sendMsg() {
  const msg = document.getElementById('msgText').value.trim();
  if (!msg) return;

  const item = document.createElement('div');
  item.className = 'barrage-item';
  item.textContent = msg;

  // 只在中间 40% 高度内随机飘
  item.style.top = Math.random() * 100 + '%';
  item.style.animationDuration = 8 + Math.random() * 5 + 's';

  document.getElementById('barrageBox').appendChild(item);
  document.getElementById('msgText').value = '';

  setTimeout(() => item.remove(), 15000);
}
</script>
