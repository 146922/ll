<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的专属网页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 导航栏 */
        nav {
            background: #2c3e50;
            padding: 0 30px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 999;
        }

        .logo {
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-size: 16px;
        }

        .nav-links a:hover {
            color: #3498db;
        }

        /* 顶部大图 */
        .banner {
            margin-top: 60px;
            width: 100%;
            height: 450px;
            background: url("top.jpg") center center / cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* 内容区 */
        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .title {
            text-align: center;
            font-size: 28px;
            margin-bottom: 30px;
            color: #333;
        }

        /* 图片卡片布局 */
        .img-box {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card p {
            padding: 15px;
            text-align: center;
            color: #555;
        }

        /* 底部 */
        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 25px 0;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="logo">我的生活记录</div>
        <div class="nav-links">
            <a href="ll.html" class="nav-item">首页</a >
            <a href="album.html" class="nav-item">相册</a >
            <a href="#" class="nav-item">日常</a >
            <a href="#" class="nav-item">关于我</a >
        </div>
    </nav>

    <!-- 顶部大图 -->
    <div class="banner">海边的温柔时刻</div>

    <!-- 内容区 -->
    <div class="container">
        <h2 class="title">我的生活碎片</h2>
        <div class="img-box">
            <div class="card">
                <img src="pic1.jpg" alt="像素特效自拍">
                <p>趣味像素自拍</p >
            </div>
            <div class="card">
                <img src="pic2.jpg" alt="场馆背影">
                <p>现场观赛时刻</p >
            </div>
            <div class="card">
                <img src="pic3.jpg" alt="待补充">
                <p>更多精彩瞬间</p >
            </div>
        </div>
    </div>

    <!-- 底部 -->
    <footer>
        © 2026 我的生活记录 版权所有
    </footer>

    <!-- 引入JS文件 -->
    <script src="script.js"></script>
</body>
</html>
